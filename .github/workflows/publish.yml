# Publish — Trusted Publishing (OIDC), token nélkül.
#
# ELŐFELTÉTELEK (egyszeri, manuális beállítás a registry-oldalon):
#   PyPI:  pypi.org → project 'a11yfy' → Publishing → add GitHub publisher
#          (owner: a11yfy, repo: sdk, workflow: publish.yml, env: pypi)
#   npm:   npmjs.com → @a11yfy/sdk → Settings → Trusted Publisher
#          (GitHub Actions, a11yfy/sdk, publish.yml)
#
# Kioldás: verzió-tag pusholása:
#   py-v0.1.0  → PyPI publish (sdks/python)
#   js-v0.1.0  → npm publish  (sdks/typescript)

name: Publish

on:
  push:
    tags:
      - "py-v*"
      - "js-v*"

permissions:
  contents: read

jobs:
  pypi:
    if: startsWith(github.ref_name, 'py-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC a PyPI Trusted Publishinghez
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#py-v}"
          PKG_VERSION=$(uv run python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          test "$TAG_VERSION" = "$PKG_VERSION" || { echo "tag $TAG_VERSION != pyproject $PKG_VERSION"; exit 1; }
      - name: Test
        run: uv sync && uv run pytest -q
      - name: Build
        run: uv build
      - name: Publish to PyPI (OIDC)
        run: uv publish

  npm:
    if: startsWith(github.ref_name, 'js-v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write # OIDC az npm Trusted Publishinghez
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#js-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          test "$TAG_VERSION" = "$PKG_VERSION" || { echo "tag $TAG_VERSION != package.json $PKG_VERSION"; exit 1; }
      - name: Install
        run: npm ci
      - name: Publish to npm (OIDC, prepublishOnly futtatja a check+build+test-et)
        run: npm publish --access public
